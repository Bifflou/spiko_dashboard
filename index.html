<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EURCV Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header { margin-bottom: 2rem; }

    header h1 { font-size: 1.6rem; font-weight: 700; color: #f0f6fc; }

    header p {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      color: #8b949e;
    }

    .legend {
      display: flex;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: #8b949e;
      font-weight: 600;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      max-width: 1100px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1.25rem;
    }

    .chart-wrap {
      position: relative;
      height: 320px;
    }

    #last-updated {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #484f58;
    }

    .error {
      color: #f85149;
      font-size: 0.85rem;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>EUR CoinVertible (EURCV)</h1>
    <p>Supply × EUR/USD · Données on-chain</p>
  </header>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#58a6ff"></div>
      Ethereum
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#9945ff"></div>
      Solana
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Market Capitalisation (USD)</h2>
      <div class="chart-wrap">
        <canvas id="chart-mcap"></canvas>
      </div>
    </div>
    <div class="card">
      <h2>Nombre de Holders</h2>
      <div class="chart-wrap">
        <canvas id="chart-holders"></canvas>
      </div>
    </div>
  </div>

  <p id="last-updated"></p>

  <script>
    const ETH_COLOR = "#58a6ff";
    const SOL_COLOR = "#9945ff";

    function formatUSD(v) {
      if (v >= 1e9) return "$" + (v / 1e9).toFixed(2) + "B";
      if (v >= 1e6) return "$" + (v / 1e6).toFixed(2) + "M";
      if (v >= 1e3) return "$" + (v / 1e3).toFixed(0) + "K";
      return "$" + v.toFixed(0);
    }

    function formatDate(s) {
      const [y, m, d] = s.split("-");
      return `${d}/${m}/${y}`;
    }

    // Merge two date-keyed series onto a unified sorted date axis
    function mergeOnDates(seriesA, seriesB, keyA, keyB) {
      const dateSet = new Set([
        ...seriesA.map(d => d.date),
        ...seriesB.map(d => d.date),
      ]);
      const dates = [...dateSet].sort();

      const mapA = Object.fromEntries(seriesA.map(d => [d.date, d[keyA]]));
      const mapB = Object.fromEntries(seriesB.map(d => [d.date, d[keyB]]));

      return {
        labels: dates.map(formatDate),
        valuesA: dates.map(d => mapA[d] ?? null),
        valuesB: dates.map(d => mapB[d] ?? null),
      };
    }

    function makeGradient(ctx, color) {
      const grad = ctx.createLinearGradient(0, 0, 0, 320);
      grad.addColorStop(0, color + "33");
      grad.addColorStop(1, color + "00");
      return grad;
    }

    function buildDualChart(canvasId, labels, valuesA, valuesB, tooltipFn) {
      const ctx = document.getElementById(canvasId).getContext("2d");

      new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              label: "Ethereum",
              data: valuesA,
              borderColor: ETH_COLOR,
              borderWidth: 2,
              backgroundColor: makeGradient(ctx, ETH_COLOR),
              fill: true,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4,
              pointHoverBackgroundColor: ETH_COLOR,
              spanGaps: false,
            },
            {
              label: "Solana",
              data: valuesB,
              borderColor: SOL_COLOR,
              borderWidth: 2,
              backgroundColor: makeGradient(ctx, SOL_COLOR),
              fill: true,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4,
              pointHoverBackgroundColor: SOL_COLOR,
              spanGaps: false,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: "#1c2128",
              borderColor: "#30363d",
              borderWidth: 1,
              titleColor: "#8b949e",
              bodyColor: "#e6edf3",
              padding: 10,
              callbacks: {
                label: (ctx) => {
                  if (ctx.parsed.y === null) return null;
                  return `${ctx.dataset.label} : ${tooltipFn(ctx.parsed.y)}`;
                },
              },
            },
          },
          scales: {
            x: {
              ticks: { color: "#8b949e", maxTicksLimit: 8, maxRotation: 0 },
              grid: { color: "#21262d" },
            },
            y: {
              ticks: { color: "#8b949e" },
              grid: { color: "#21262d" },
              beginAtZero: false,
            },
          },
        },
      });
    }

    async function loadJSON(path) {
      const r = await fetch(path);
      if (!r.ok) throw new Error(`Impossible de charger ${path}`);
      return r.json();
    }

    async function init() {
      try {
        const [ethMcap, ethHolders, solMcap, solHolders] = await Promise.all([
          loadJSON("data/marketcap.json"),
          loadJSON("data/holders.json"),
          loadJSON("data/sol_marketcap.json"),
          loadJSON("data/sol_holders.json"),
        ]);

        const mcap = mergeOnDates(ethMcap, solMcap, "marketcap", "marketcap");
        buildDualChart("chart-mcap", mcap.labels, mcap.valuesA, mcap.valuesB, formatUSD);

        const holders = mergeOnDates(ethHolders, solHolders, "holders", "holders");
        buildDualChart("chart-holders", holders.labels, holders.valuesA, holders.valuesB,
          v => v.toLocaleString("fr-FR") + " holders");

        document.getElementById("last-updated").textContent =
          "Dernière mise à jour : " + new Date().toLocaleString("fr-FR", { timeZone: "UTC" }) + " UTC";

      } catch (err) {
        document.querySelector(".grid").innerHTML =
          `<div class="error">Erreur : ${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
