<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EURCV Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f0f6fc;
    }

    header p {
      margin-top: 0.35rem;
      font-size: 0.85rem;
      color: #8b949e;
    }

    header p span {
      color: #58a6ff;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      max-width: 1100px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1.25rem;
    }

    .chart-wrap {
      position: relative;
      height: 320px;
    }

    #last-updated {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #484f58;
    }

    .error {
      color: #f85149;
      font-size: 0.85rem;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>EUR CoinVertible (EURCV)</h1>
    <p>Token <span>0x5F7827FDeb7c20b443265Fc2F40845B715385Ff2</span> · Ethereum</p>
  </header>

  <div class="grid">
    <div class="card">
      <h2>Market Capitalisation (USD)</h2>
      <div class="chart-wrap">
        <canvas id="chart-mcap"></canvas>
      </div>
    </div>
    <div class="card">
      <h2>Nombre de Holders</h2>
      <div class="chart-wrap">
        <canvas id="chart-holders"></canvas>
      </div>
    </div>
  </div>

  <p id="last-updated"></p>

  <script>
    const CHART_DEFAULTS = {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1c2128",
          borderColor: "#30363d",
          borderWidth: 1,
          titleColor: "#8b949e",
          bodyColor: "#e6edf3",
          padding: 10,
        },
      },
      scales: {
        x: {
          ticks: { color: "#8b949e", maxTicksLimit: 8, maxRotation: 0 },
          grid: { color: "#21262d" },
        },
        y: {
          ticks: { color: "#8b949e" },
          grid: { color: "#21262d" },
          beginAtZero: false,
        },
      },
    };

    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split("-");
      return `${d}/${m}/${y}`;
    }

    function formatUSD(value) {
      if (value >= 1e9) return "$" + (value / 1e9).toFixed(2) + "B";
      if (value >= 1e6) return "$" + (value / 1e6).toFixed(2) + "M";
      if (value >= 1e3) return "$" + (value / 1e3).toFixed(0) + "K";
      return "$" + value.toFixed(0);
    }

    async function loadJSON(path) {
      const resp = await fetch(path);
      if (!resp.ok) throw new Error(`Impossible de charger ${path}`);
      return resp.json();
    }

    function buildChart(canvasId, labels, values, color, tooltipFormatter) {
      const ctx = document.getElementById(canvasId).getContext("2d");

      const gradient = ctx.createLinearGradient(0, 0, 0, 320);
      gradient.addColorStop(0, color + "33");
      gradient.addColorStop(1, color + "00");

      new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [
            {
              data: values,
              borderColor: color,
              borderWidth: 2,
              backgroundColor: gradient,
              fill: true,
              tension: 0.3,
              pointRadius: 0,
              pointHoverRadius: 4,
              pointHoverBackgroundColor: color,
            },
          ],
        },
        options: {
          ...CHART_DEFAULTS,
          plugins: {
            ...CHART_DEFAULTS.plugins,
            tooltip: {
              ...CHART_DEFAULTS.plugins.tooltip,
              callbacks: {
                label: (ctx) => tooltipFormatter(ctx.parsed.y),
              },
            },
          },
        },
      });
    }

    async function init() {
      try {
        const [mcapData, holdersData] = await Promise.all([
          loadJSON("data/marketcap.json"),
          loadJSON("data/holders.json"),
        ]);

        buildChart(
          "chart-mcap",
          mcapData.map((d) => formatDate(d.date)),
          mcapData.map((d) => d.marketcap),
          "#58a6ff",
          (v) => formatUSD(v)
        );

        buildChart(
          "chart-holders",
          holdersData.map((d) => formatDate(d.date)),
          holdersData.map((d) => d.holders),
          "#3fb950",
          (v) => v.toLocaleString("fr-FR") + " holders"
        );

        const now = new Date().toLocaleString("fr-FR", { timeZone: "UTC" });
        document.getElementById("last-updated").textContent =
          "Dernière mise à jour : " + now + " UTC";
      } catch (err) {
        document.querySelector(".grid").innerHTML =
          `<div class="error">Erreur de chargement des données : ${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
