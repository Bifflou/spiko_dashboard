name: Update Dashboard Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch FX rates (EUR/GBP/CHF → USD)
        run: python scripts/fetch_fx_rates.py

      - name: Fetch Ethereum data (all 9 tokens)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python scripts/fetch_evm_data.py eth

      - name: Fetch Polygon data (all 9 tokens)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python scripts/fetch_evm_data.py polygon

      - name: Fetch Base data (all 9 tokens)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python scripts/fetch_evm_data.py base

      - name: Fetch Arbitrum data (all 9 tokens)
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: python scripts/fetch_evm_data.py arb

      - name: Fetch Etherlink data (7 tokens)
        run: python scripts/fetch_etherlink_data.py

      - name: Fetch Stellar data (all 9 tokens)
        run: python scripts/fetch_stellar_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update dashboard data $(date -u '+%Y-%m-%d')"
          git push
